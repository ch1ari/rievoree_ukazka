<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="X-RAY">
  <!-- Lime "paper" tile — matches the landing palette -->
  <rect width="32" height="32" rx="7" fill="#9ed60f"/>
  <!-- Bold black "X" (the brand initial / x-ray motif) -->
  <g stroke="#16261a" stroke-width="3.6" stroke-linecap="round">
    <line x1="8.5" y1="9" x2="20.5" y2="23"/>
    <line x1="20.5" y1="9" x2="8.5" y2="23"/>
  </g>
  <!-- Trailing slash, echoing the "X-RAY/" wordmark -->
  <line x1="23" y1="23.5" x2="26.5" y2="8.5" stroke="#16261a" stroke-width="2.6" stroke-linecap="round"/>
</svg>
