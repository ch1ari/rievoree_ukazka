# Custom services on top of the Supabase local stack.
#
# `supabase start` already runs Postgres/Auth/Storage/Studio as Docker
# containers (the CLI manages its own compose project). This file adds OUR
# services — duplicating the Supabase stack here would mean two databases
# and two migration mechanisms. One command for everything: `npm run stack`.
#
# Portability note: the worker reaches the host's Supabase Postgres via
# host.docker.internal. That name is built into Docker Desktop (macOS/
# Windows); the extra_hosts entry below maps it on native Linux too
# (host-gateway works on Docker 20.10+).
services:
  worker:
    build: ./worker
    environment:
      DATABASE_URL: ${WORKER_DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-2000}
      # Storage access for downloading the uploaded file (service role bypasses
      # the private ingest bucket). For local dev the worker reaches the host's
      # Supabase via host.docker.internal.
      SUPABASE_URL: ${WORKER_SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_SERVICE_ROLE_KEY: ${WORKER_SERVICE_ROLE_KEY:-}
      # Optional human-stable worker identity for the X-ray "who holds this job"
      # view; defaults to <container-hostname>#<pid> when unset.
      WORKER_ID: ${WORKER_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
